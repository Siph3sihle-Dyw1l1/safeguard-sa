<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Medic - SafeGuard SA</title>

  <!-- Bootstrap -->

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"/>

  <style>
    :root {
      --primary: #0d9488;
      --primary-dark: #0f766e;
      --bg: #f0fdfa;
      --border: #e2e8f0;
      --user-bubble: #0d9488;
      --bot-bubble: #f1f5f9;
      --text: #134e4a;
      --muted: #6b7280;
    }

    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
    }

    .exit-btn {
      position: fixed;
      top: 14px;
      right: 14px;
      background: #dc2626;
      color: white;
      padding: 8px 18px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 13px;
      text-decoration: none;
      z-index: 9999;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
      background: white;
      box-shadow: 0 0 40px rgba(0,0,0,0.05);
    }

    .chat-header {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-header h1 {
      font-size: 1.1rem;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .emergency-link {
      color: white;
      background: rgba(255,255,255,0.15);
      padding: 0.4rem 0.9rem;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message {
      display: flex;
      gap: 0.75rem;
      max-width: 85%;
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .message.user .avatar {
      background: var(--primary);
      color: white;
    }

    .message.bot .avatar {
      background: var(--bot-bubble);
      color: var(--primary);
      border: 1px solid var(--border);
    }

    .bubble {
      padding: 0.875rem 1.1rem;
      border-radius: 18px;
      line-height: 1.5;
      font-size: 0.9rem;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      color: white;
    }

    .message.bot .bubble {
      background: var(--bot-bubble);
      color: var(--text);
    }

    .input-area {
      padding: 1rem;
      border-top: 1px solid var(--border);
    }

    .input-row {
      display: flex;
      gap: 10px;
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 8px 12px;
    }

    textarea {
      flex: 1;
      border: none;
      outline: none;
      resize: none;
    }

    .send-btn {
      width: 38px;
      height: 38px;
      background: var(--primary);
      border: none;
      border-radius: 10px;
      color: white;
    }
  </style>

</head>

<body>

<a href="https://www.google.com" class="exit-btn">✕ Exit</a>

<div class="app">

  <header class="chat-header">
    <h1>
      <span class="logo-icon"><i class="bi bi-heart-pulse"></i></span>
      SafeGuard Health Assistant
    </h1>

```
<a href="/emergency" class="emergency-link">
  <i class="bi bi-exclamation-triangle-fill"></i>
  Emergency
</a>
```

  </header>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="Type your question..."></textarea>

```
  <button class="send-btn" onclick="send()">
    <i class="bi bi-send-fill"></i>
  </button>
</div>
```

  </div>

</div>

<script>
function addMessage(text, type) {
  const messages = document.getElementById('messages');

  const div = document.createElement('div');
  div.className = 'message ' + type;

  div.innerHTML = `
    <div class="avatar">${type === 'user' ? '👤' : '🤖'}</div>
    <div class="bubble">${text}</div>
  `;

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();

  if (!text) return;

  addMessage(text, 'user');
  input.value = '';

  const res = await fetch('/chat/ask', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();

  if (data.emergency) {
    window.location.href = "/emergency?category=" + data.category;
    return;
  }

  addMessage(data.response || "No response", 'bot');
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
