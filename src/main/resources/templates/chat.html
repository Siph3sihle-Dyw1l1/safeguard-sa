<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>AI Medic - SafeGuard SA</title>

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"/>

        <style>
            :root {
                --primary: #0d9488;
                --primary-dark: #0f766e;
                --bg: #f0fdfa;
                --border: #e2e8f0;
                --user-bubble: #0d9488;
                --bot-bubble: #f1f5f9;
                --text: #134e4a;
                --muted: #6b7280;
                --emergency-red: #b91c1c;
            }

            html, body {
                height: 100%;
                margin: 0;
                font-family: 'Segoe UI', sans-serif;
                background: var(--bg);
            }

            .app {
                position: relative;
                display: flex;
                flex-direction: column;
                height: 100vh;
                max-width: 1150px;
                margin: 0 auto;
                background: white;
                box-shadow: 0 0 60px rgba(0,0,0,0.05);
            }

            /* --- UNIFIED SOLID HEADER (From the new design) --- */
            .chat-header {
                background: var(--primary);
                color: white;
                height: 80px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 2.5rem;
            }

            .chat-header h1 {
                font-size: 1.5rem;
                margin: 0;
                font-weight: 600;
                display: flex;
                align-items: center;
                gap: 12px;
            }

            .header-right {
                display: flex;
                align-items: center;
                gap: 20px;
            }

            /* --- NAV BUTTONS (From the new design) --- */
            .chat-nav {
                display: flex;
                gap: 12px;
            }

            .chat-nav a {
                color: white;
                text-decoration: none;
                font-weight: 600;
                font-size: 0.95rem;
                padding: 8px 16px;
                border-radius: 6px;
                border: 1px solid transparent;
                transition: all 0.3s ease;
                display: inline-block;
            }

            .chat-nav a:hover {
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.3);
                color: white;
                transform: translateY(-1px);
            }

            /* --- EMERGENCY BUTTON (From the new design) --- */
            .emergency-btn {
                border: 1.5px solid #ef4444;
                color: #ef4444 !important;
                background: white;
                padding: 8px 20px;
                border-radius: 8px;
                text-decoration: none;
                font-weight: 700;
                font-size: 0.95rem;
                display: flex;
                align-items: center;
                gap: 8px;
                transition: all 0.2s ease;
                cursor: pointer;
                margin-left: 10px;
            }

            .emergency-btn:hover {
                background: #fef2f2;
                transform: translateY(-2px);
                box-shadow: 0 4px 8px rgba(185, 28, 28, 0.1);
            }

            /* --- EXIT BUTTON (Bottom corner) --- */
            .exit-btn {
                position: fixed;
                bottom: 20px;
                right: 20px;
                color: #94a3b8;
                text-decoration: none;
                font-size: 0.8rem;
                font-weight: 600;
                padding: 6px 12px;
                border: 1px solid #e2e8f0;
                border-radius: 6px;
                background: white;
                z-index: 1000;
                transition: all 0.2s ease;
            }

            .exit-btn:hover {
                color: var(--emergency-red);
                border-color: var(--emergency-red);
                background: #fff1f2;
            }

            /* ========================================================
               RESTORED ORIGINAL CHAT FUNCTIONALITY AND AVATARS
               ======================================================== */
            .messages {
                flex: 1;
                overflow-y: auto;
                padding: 2rem;
                display: flex;
                flex-direction: column;
                gap: 1.5rem;
            }

            .message {
                display: flex;
                gap: 0.75rem;
                max-width: 85%;
            }

            .message.user {
                align-self: flex-end;
                flex-direction: row-reverse;
            }

            .message.bot {
                align-self: flex-start;
            }

            /* Restored Avatar CSS */
            .avatar {
                width: 38px;
                height: 38px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1.1rem;
                flex-shrink: 0; /* Prevents avatar from getting squished */
            }

            .message.user .avatar {
                background: var(--primary);
                color: white;
            }

            .message.bot .avatar {
                background: var(--bot-bubble);
                color: var(--primary);
                border: 1px solid var(--border);
            }

            .bubble {
                padding: 0.875rem 1.1rem;
                border-radius: 18px;
                line-height: 1.5;
                font-size: 1rem;
            }

            .message.user .bubble {
                background: var(--user-bubble);
                color: white;
            }

            .message.bot .bubble {
                background: var(--bot-bubble);
                color: var(--text);
                border: 1px solid var(--border);
            }
            /* ======================================================== */

            .disclaimer {
                text-align: center;
                font-size: 0.9rem;
                color: #64748b;
                padding-bottom: 10px;
            }

            .input-area {
                padding: 1rem 3rem 2rem 3rem;
                background: white;
            }

            .input-row {
                display: flex;
                align-items: center;
                gap: 15px;
                border: 2px solid var(--border);
                border-radius: 16px;
                padding: 14px 22px;
            }

            textarea {
                flex: 1;
                border: none;
                outline: none;
                resize: none;
                font-size: 1.1rem;
                height: 28px;
            }

            .send-btn {
                background: var(--primary);
                color: white;
                border: none;
                width: 48px;
                height: 48px;
                border-radius: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                transition: transform 0.2s;
            }

            .send-btn:hover {
                background: var(--primary-dark);
                transform: scale(1.1);
            }
        </style>
    </head>
    <body>

        <div class="app">
            <header class="chat-header">
                <h1>
                    <i class="bi bi-heart-pulse-fill"></i> SafeGuard Health Assistant
                </h1>
                <div class="header-right">
                    <nav class="chat-nav">
                        <a th:href="@{/}">Home</a>
                        <a th:href="@{/map}">Safety Map</a>
                        <a th:href="@{/tip}">Report Tip</a>
                    </nav>
                    <a th:href="@{/emergency}" class="emergency-btn">
                        <i class="bi bi-exclamation-triangle-fill"></i> Emergency
                    </a>
                </div>
            </header>

            <div class="messages" id="messages"></div>

            <div class="disclaimer">Always consult a healthcare professional.</div>

            <div class="input-area">
                <div class="input-row">
                    <textarea id="input" placeholder="Type a health question..."></textarea>
                    <button class="send-btn" onclick="send()">
                        <i class="bi bi-send-fill"></i>
                    </button>
                </div>
            </div>
        </div>

        <a th:href="@{https://www.google.com}" class="exit-btn">✕ Exit Chat</a>

        <script>
            // RESTORED ORIGINAL JAVASCRIPT WITH AVATARS
            function addMessage(text, type) {
                const messages = document.getElementById('messages');
                const div = document.createElement('div');
                div.className = 'message ' + type;
                div.innerHTML = `
                    <div class="avatar">${type === 'user' ? '👤' : '🤖'}</div>
                    <div class="bubble">${text}</div>
                `;
                messages.appendChild(div);
                messages.scrollTop = messages.scrollHeight;
            }

            async function send() {
                const input = document.getElementById('input');
                const text = input.value.trim();
                if (!text)
                    return;

                addMessage(text, 'user');
                input.value = '';

                try {
                    const res = await fetch('/chat/ask', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({message: text})
                    });
                    const data = await res.json();
                    if (data.emergency) {
                        window.location.href = "/emergency?category=" + data.category;
                        return;
                    }
                    addMessage(data.response || "No response received.", 'bot');
                } catch (err) {
                    addMessage("Connection error.", 'bot');
                }
            }

            // Allow sending with Enter key for better UX
            document.getElementById('input').addEventListener('keypress', function (e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    send();
                }
            });
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
