<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SafeGuard SA — Safety Map</title>

        <!-- Leaflet CSS — free, no API key needed -->
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

        <!-- Use whatever shared CSS Member A has set up -->
        <link rel="stylesheet" href="/css/map_css.css" />
    </head>
    <body>

        <!-- Fake exit button — always visible on every page (Member A's ExitController handles /exit) -->
        <a href="/exit" class="exit-btn">✕ Exit Site</a>

        <!-- Header / nav — match Member A's index.html style -->
        <header>
            <h1>🛡️ SafeGuard SA — Safety Map</h1>
            <nav>
                <a href="/">Home</a>
                <a href="/map">Safety Map</a>
                <a href="/tip">Report Tip</a>
                <a href="/chat">AI Medic</a>
            </nav>
        </header>

        <!-- Main layout: filter sidebar + map -->
        <div class="map-wrapper">

            <!-- Filter panel -->
            <aside class="filter-panel">
                <h2>Filter Tips</h2>

                <label for="filterProvince">Province</label>
                <select id="filterProvince">
                    <option value="">All Provinces</option>
                    <option>Gauteng</option>
                    <option>Western Cape</option>
                    <option>KwaZulu-Natal</option>
                    <option>Eastern Cape</option>
                    <option>Free State</option>
                    <option>Limpopo</option>
                    <option>Mpumalanga</option>
                    <option>North West</option>
                    <option>Northern Cape</option>
                </select>

                <label for="filterCategory">Category</label>
                <select id="filterCategory">
                    <option value="">All Categories</option>
                    <option value="CRIME">Crime</option>
                    <option value="ASSAULT">Assault</option>
                    <option value="THEFT">Theft</option>
                    <option value="SUSPICIOUS">Suspicious Activity</option>
                    <option value="OTHER">Other</option>
                </select>

                <button id="applyFilters">Apply Filters</button>
                <button id="resetFilters">Reset</button>

                <!-- Map legend -->
                <div class="legend">
                    <h3>Legend</h3>
                    <p><span style="color:darkred;">●</span> Assault</p>
                    <p><span style="color:red;">●</span> Crime</p>
                    <p><span style="color:orange;">●</span> Theft</p>
                    <p><span style="color:gold;">●</span> Suspicious</p>
                    <p><span style="color:grey;">●</span> Other</p>
                </div>

                <a href="/tip">🚨 Submit a Safety Tip</a>
            </aside>

            <!-- Leaflet map container -->
            <div id="map"></div>

        </div>

        <p style="padding: 8px 14px; font-size: 0.82rem; color: #555;">
            ℹ️ All tips are anonymous and community-submitted.
            Always call <strong>10111</strong> in an emergency.
        </p>

        <!-- Leaflet JS — free, no API key needed -->
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

        <!-- Member C: map logic -->
        <script>
    // 1. Color mapping based on your legend
    const CATEGORY_COLOURS = {
        CRIME:      'red',
        ASSAULT:    'darkred',
        THEFT:      'orange',
        SUSPICIOUS: 'gold',
        OTHER:      'grey'
    };


    // 2. Initialise the Map - Restricted strictly to South Africa
    
    // Define the geographical boundaries of South Africa
    const saBounds = L.latLngBounds(
        L.latLng(-35.0, 16.0), // South-West (Cape Agulhas area)
        L.latLng(-22.0, 33.0)  // North-East (Musina/Kruger area)
    );

    const map = L.map('map', {
        center: [-28.4793, 24.6727],
        zoom: 6,
        minZoom: 6,               // Prevents zooming out to see other countries
        maxBounds: saBounds,      // Locks the camera to South Africa
        maxBoundsViscosity: 1.0   // Makes the boundaries "solid" (bounces back immediately)
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap',
        bounds: saBounds          // Only load tiles within the SA area
    }).addTo(map);

    // 3. Function to create pins from data
    function renderTips(tips, filterProvince, filterCategory) {
        markerLayer.clearLayers();

        tips.forEach(function(tip) {
            // Apply dropdown filters
            if (filterProvince && tip.province !== filterProvince) return;
            if (filterCategory && tip.category !== filterCategory) return;

            const colour = CATEGORY_COLOURS[tip.category] || 'grey';

            // Create the pin (CircleMarker)
            const marker = L.circleMarker([tip.latitude, tip.longitude], {
                color:       colour,
                fillColor:   colour,
                fillOpacity: 0.8,
                radius:      10, 
                weight:      2
            });

            // Add information popup
            marker.bindPopup(`
                <div style="font-family: sans-serif;">
                    <strong style="color:${colour};">${tip.category}</strong><br>
                    <b>${tip.streetArea}</b><br>
                    <small>${tip.city}, ${tip.province}</small><br>
                    <p style="margin-top:5px; border-top:1px solid #eee; padding-top:5px;">
                        ${tip.description}
                    </p>
                </div>
            `);

            markerLayer.addLayer(marker);
        });
    }

    // 4. Fetch the data from your SafetyMapController
    function fetchAndRenderTips() {
        fetch('/map/tips')
            .then(response => {
                if (!response.ok) throw new Error('Data fetch failed');
                return response.json();
            })
            .then(tips => {
                allTips = tips;
                renderTips(tips, '', '');
            })
            .catch(err => console.error('Error loading pins:', err));
    }

    // 5. Connect the buttons
    document.addEventListener('DOMContentLoaded', function() {
        fetchAndRenderTips();

        document.getElementById('applyFilters').onclick = function() {
            const province = document.getElementById('filterProvince').value;
            const category = document.getElementById('filterCategory').value;
            renderTips(allTips, province, category);
        };

        document.getElementById('resetFilters').onclick = function() {
            document.getElementById('filterProvince').value = '';
            document.getElementById('filterCategory').value = '';
            renderTips(allTips, '', '');
        };
    });
</script>

    </body>
</html>
