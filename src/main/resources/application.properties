spring.application.name=safeguard-sa

# --- SERVER ---
server.port=8080

# --- LOCAL DATABASE (PostgreSQL) ---
# We changed the URL to point to 'localhost' and your new 'safeguard_db'
spring.datasource.url=jdbc:postgresql://localhost:5432/safeguard_db
spring.datasource.username=postgres
# Replace 'YOUR_PGADMIN_PASSWORD' with the password you set during installation
spring.datasource.password=Safeguard_sa_int316d
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA & Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true


# --- Hikari Connection Pool (Standard Local Settings) ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# --- Thymeleaf ---
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false



# --- Gmail SMTP ---
# Reminder: Replace these with your actual Gmail and App Password for emails to work
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=yourgmail@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true