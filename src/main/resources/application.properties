spring.application.name=safeguard-sa
#---server----
server.port=8080

# --- DEVELOPMENT DATABASE (H2) ---
spring.datasource.url=jdbc:h2:mem:safeguarddb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update


spring.ai.vertex.ai.gemini.project-id=gen-lang-client-0466905290
spring.ai.vertex.ai.gemini.location=us-central1
spring.ai.vertex.ai.gemini.chat.model=gemini-1.5-pro
spring.ai.vertex.ai.gemini.transport=rest
spring.ai.vertex.ai.gemini.chat.enabled=true

# --- AI MEDIC SETTINGS (Google AI Studio) ---
#spring.ai.googleai.api-key=YOUR_ACTUAL_API_KEY_HERE
#spring.ai.googleai.chat.options.model=gemini-1.5-pro


# --- GMAIL SMTP SETTINGS ---
# For area alert notification emails [cite: 229]
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=yourgmail@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

## Tell Thymeleaf exactly where the files are in the WAR structure
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
